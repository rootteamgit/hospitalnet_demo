<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>動画プレイヤー操作デモ</title>
  <script type="text/javascript" src="https://assets.mediadelivery.net/playerjs/playerjs-latest.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Helvetica Neue', sans-serif;
      background: #e8e8e8;
      color: #111;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 80px;
      gap: 80px;
    }

    h1 {
      font-size: 20px;
      font-weight: 400;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #222;
    }

    .section {
      width: 100%;
      max-width: 1280px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    .section-label {
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #555;
      margin-bottom: 20px;
      align-self: flex-start;
    }

    .player-container {
      position: relative;
      padding-top: 56.25%;
      width: 100%;
    }

    .player-container iframe,
    .player-container video {
      position: absolute;
      top: 0;
      width: 100%;
      height: 100%;
      border: none;
      background: #000;
    }

    .controls {
      display: flex;
      gap: 24px;
      margin-top: 36px;
    }

    button {
      padding: 28px 80px;
      font-size: 24px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: opacity 0.15s, outline 0.1s;
      outline: 4px solid transparent;
    }

    button:hover { opacity: 0.8; }
    button:focus { outline: 4px solid #0066cc; outline-offset: 4px; }
    button:active { opacity: 0.6; }
    button:disabled { opacity: 0.3; cursor: not-allowed; }

    .btn-play  { background: #1a6fd4; color: #fff; }
    .btn-pause { background: #444; color: #fff; }

    .status {
      margin-top: 24px;
      font-size: 20px;
      color: #222;
      letter-spacing: 0.05em;
    }

    hr {
      width: 100%;
      max-width: 1280px;
      border: none;
      border-top: 1px solid #bbb;
    }
  </style>
</head>
<body>

  <h1>ホスピタルネット様用　埋め込み動画操作デモ</h1>

  <!-- iframe (OneStream) -->
  <div class="section">
    <p class="section-label">iframe</p>
    <div class="player-container">
      <iframe id="iframe-player"
          src="https://iframe.mediadelivery.net/embed/56197/59c9f753-414f-4660-a12e-c35b522fd147"
          loading="eager"
          allow="accelerometer; gyroscope; autoplay; encrypted-media; picture-in-picture;" allowfullscreen="true">
      </iframe>
    </div>
    <div class="controls">
      <button id="iframe-btn-play"  class="btn-play"  disabled>▶ Play</button>
      <button id="iframe-btn-pause" class="btn-pause" disabled>⏸ Pause</button>
    </div>
    <p class="status" id="iframe-status">プレイヤー読み込み中...</p>
  </div>

  <hr>

  <!-- video直貼り (BunnyCDN MP4) -->
  <!--
  <div class="section">
    <p class="section-label">② videoタグ</p>
    <div class="player-container">
      <video id="video-player" controls playsinline>
        <source src="https://vz-5c7b599d-cda.b-cdn.net/1a36ea5e-f512-4140-b292-17e5eb445414/play_720p.mp4" type="video/mp4">
      </video>
    </div>
    <div class="controls">
      <button id="video-btn-play"  class="btn-play"  disabled>▶ Play</button>
      <button id="video-btn-pause" class="btn-pause" disabled>⏸ Pause</button>
    </div>
    <p class="status" id="video-status">プレイヤー読み込み中...</p>
  </div>
  -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // ① iframe (playerjs)
      const iframePlayer = new playerjs.Player(document.getElementById('iframe-player'));
      const iframeBtnPlay  = document.getElementById('iframe-btn-play');
      const iframeBtnPause = document.getElementById('iframe-btn-pause');
      const iframeStatus   = document.getElementById('iframe-status');

      iframePlayer.on('ready', () => {
        iframeBtnPlay.disabled  = false;
        iframeBtnPause.disabled = false;
        iframeStatus.textContent = 'プレイヤー準備完了';
      });
      iframePlayer.on('play',  () => { iframeStatus.textContent = '再生中'; });
      iframePlayer.on('pause', () => { iframeStatus.textContent = '一時停止'; });
      iframePlayer.on('ended', () => { iframeStatus.textContent = '再生完了'; });

      iframeBtnPlay.addEventListener('click',  () => iframePlayer.play());
      iframeBtnPause.addEventListener('click', () => iframePlayer.pause());

      // ② video直貼り
      const video = document.getElementById('video-player');
      const videoBtnPlay  = document.getElementById('video-btn-play');
      const videoBtnPause = document.getElementById('video-btn-pause');
      const videoStatus   = document.getElementById('video-status');

      video.addEventListener('canplay', () => {
        videoBtnPlay.disabled  = false;
        videoBtnPause.disabled = false;
        videoStatus.textContent = 'プレイヤー準備完了';
      });
      video.addEventListener('error', () => { videoStatus.textContent = '読み込みエラー'; });
      video.addEventListener('play',  () => { videoStatus.textContent = '再生中'; });
      video.addEventListener('pause', () => { videoStatus.textContent = '一時停止'; });
      video.addEventListener('ended', () => { videoStatus.textContent = '再生完了'; });

      videoBtnPlay.addEventListener('click',  () => video.play());
      videoBtnPause.addEventListener('click', () => video.pause());
    });
  </script>

</body>
</html>
