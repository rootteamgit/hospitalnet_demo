<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>動画プレイヤー操作デモ</title>
  <script type="text/javascript" src="https://assets.mediadelivery.net/playerjs/playerjs-latest.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Helvetica Neue', sans-serif;
      background: #e8e8e8;
      color: #111;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 80px;
    }

    h1 {
      font-size: 20px;
      font-weight: 400;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #222;
      margin-bottom: 40px;
    }

    .controls {
      display: flex;
      gap: 24px;
      margin-top: 36px;
    }

    button {
      padding: 28px 80px;
      font-size: 24px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: opacity 0.15s, outline 0.1s;
      outline: 4px solid transparent;
    }

    button:hover { opacity: 0.8; }
    button:focus { outline: 4px solid #0066cc; outline-offset: 4px; }
    button:active { opacity: 0.6; }
    button:disabled { opacity: 0.3; cursor: not-allowed; }

    #btn-play  { background: #1a6fd4; color: #fff; }
    #btn-pause { background: #444; color: #fff; }

    .status {
      margin-top: 24px;
      font-size: 20px;
      color: #222;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

  <h1>ホスピタルネット様用　埋め込み動画操作デモ</h1>

  <div style="position: relative; padding-top: 56.25%; width: 100%; max-width: 1280px;">
    <iframe id="bunny-player"
        src="https://iframe.mediadelivery.net/embed/56197/1a36ea5e-f512-4140-b292-17e5eb445414"
        loading="eager" style="border: none; position: absolute; top: 0; height: 100%; width: 100%;"
        allow="accelerometer; gyroscope; autoplay; encrypted-media; picture-in-picture;" allowfullscreen="true">
    </iframe>
  </div>

  <div class="controls">
    <button id="btn-play"  disabled>▶ Play</button>
    <button id="btn-pause" disabled>⏸ Pause</button>
  </div>

  <p class="status" id="status">プレイヤー読み込み中...</p>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const player = new playerjs.Player(document.getElementById('bunny-player'));

      const btnPlay  = document.getElementById('btn-play');
      const btnPause = document.getElementById('btn-pause');
      const status   = document.getElementById('status');

      player.on('ready', () => {
        btnPlay.disabled  = false;
        btnPause.disabled = false;
        status.textContent = 'プレイヤー準備完了';
      });

      player.on('play',  () => { status.textContent = '再生中'; });
      player.on('pause', () => { status.textContent = '一時停止'; });
      player.on('ended', () => { status.textContent = '再生完了'; });

      btnPlay.addEventListener('click',  () => player.play());
      btnPause.addEventListener('click', () => player.pause());
    });
  </script>

</body>
</html>
