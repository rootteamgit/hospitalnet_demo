<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>動画プレイヤー操作デモ</title>
  <script type="text/javascript" src="https://assets.mediadelivery.net/playerjs/playerjs-latest.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Helvetica Neue', sans-serif;
      background: #0f0f0f;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    h1 {
      font-size: 14px;
      font-weight: 400;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 32px;
    }

    .player-wrapper {
      width: 100%;
      max-width: 720px;
      aspect-ratio: 16/9;
      background: #1a1a1a;
      border-radius: 4px;
      overflow: hidden;
    }

    .player-wrapper iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    .controls {
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }

    button {
      padding: 14px 40px;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border: none;
      border-radius: 2px;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    button:hover { opacity: 0.8; }
    button:active { opacity: 0.6; }
    button:disabled { opacity: 0.3; cursor: not-allowed; }

    #btn-play  { background: #fff; color: #0f0f0f; }
    #btn-pause { background: #333; color: #fff; }

    .status {
      margin-top: 16px;
      font-size: 12px;
      color: #555;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

  <h1>Player Control Demo</h1>

  <div class="player-wrapper">
    <!--
      TODO: 下記 src を実際の Bunny Stream の埋め込み URL に差し替えてください
      例: https://iframe.mediadelivery.net/embed/LIBRARY_ID/VIDEO_ID
    -->
    <iframe
      id="bunny-player"
      src="https://iframe.mediadelivery.net/embed/000000/00000000-0000-0000-0000-000000000000"
      allow="accelerometer; gyroscope; autoplay; encrypted-media; picture-in-picture"
      allowfullscreen
    ></iframe>
  </div>

  <div class="controls">
    <button id="btn-play"  disabled>Play</button>
    <button id="btn-pause" disabled>Pause</button>
  </div>

  <p class="status" id="status">プレイヤー読み込み中...</p>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const player = new playerjs.Player(document.getElementById('bunny-player'));

      const btnPlay  = document.getElementById('btn-play');
      const btnPause = document.getElementById('btn-pause');
      const status   = document.getElementById('status');

      player.on('ready', () => {
        btnPlay.disabled  = false;
        btnPause.disabled = false;
        status.textContent = 'プレイヤー準備完了';
      });

      player.on('play',  () => { status.textContent = '再生中'; });
      player.on('pause', () => { status.textContent = '一時停止'; });
      player.on('ended', () => { status.textContent = '再生完了'; });

      btnPlay.addEventListener('click',  () => player.play());
      btnPause.addEventListener('click', () => player.pause());
    });
  </script>

</body>
</html>
